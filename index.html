<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXAURON | Home</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at top, #0f2027, #000000);
  color: white;
  min-height: 100vh;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0, 0, 0, 0.9);
  border-bottom: 1px solid #00ffd533;
}

.logo-link {
  display: flex;
  align-items: center;
  text-decoration: none;
  transition: 0.3s;
}

.logo-link:hover { opacity: 0.8; }

.logo-link img {
  height: 50px;
  margin-right: 15px;
  border-radius: 8px;
}

.logo-link h1 {
  color: #00ffd5;
  margin: 0;
  font-size: 26px;
  letter-spacing: 2px;
}

/* NAV LINKS WITH FRAMES */
.nav-links {
  display: flex;
  gap: 15px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 10px 25px;
  border: 2px solid #00ffd5;
  border-radius: 10px;
  transition: all 0.3s ease;
}

.nav-links a:hover {
  background: #00ffd5;
  color: black;
  box-shadow: 0 0 15px rgba(0, 255, 213, 0.5);
  transform: translateY(-2px);
}

/* HERO SECTION */
.hero {
  text-align: center;
  padding: 150px 20px;
}

.hero h1 {
  font-size: 70px;
  color: #00ffd5;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(0, 255, 213, 0.5);
}

.hero p {
  color: #aaa;
  font-size: 24px;
  max-width: 800px;
  margin: 10px auto;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  background: #050505;
  color: #555;
  position: absolute;
  bottom: 0;
  width: 100%;
  border-top: 1px solid #111;
}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="logo-link">
    <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Logo">
    <h1>NEXAURON</h1>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="team.html">Team</a>
    <a href="support.html">Support</a>
  </div>
</nav>

<div class="hero">
  <h1>NEXAURON</h1>
  <p>We bring our games into a perfect atmosphere suitable for everyone.</p>
</div>

<footer>
  © 2026 NEXAURON Studios - All Rights Reserved
</footer>

</body>
</html>
