<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXAURON | Home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* ضمان أن الصفحة تأخذ العرض الكامل بدون فراغات */
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }
  
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: radial-gradient(circle at top, #0f2027, #000000); 
    color: white; 
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* حل مشكلة البنر: جعل النافبار يمتد 100% دائماً */
  header {
    width: 100%;
    background: rgba(0, 0, 0, 0.95);
    border-bottom: 1px solid #00ffd533;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  nav { 
    max-width: 1200px; /* تحديد عرض المحتوى داخل النافبار */
    margin: 0 auto;
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 15px 20px;
    flex-wrap: wrap;
  }
  
  .logo-link { display: flex; align-items: center; text-decoration: none; }
  .logo-link img { height: 40px; margin-right: 12px; border-radius: 5px; }
  .logo-link h1 { color: #00ffd5; margin: 0; font-size: 22px; letter-spacing: 1px; }
  
  .nav-links { display: flex; gap: 15px; }
  .nav-links a { 
    color: white; 
    text-decoration: none; 
    font-weight: bold; 
    padding: 8px 15px; 
    border: 1px solid #00ffd5; 
    border-radius: 8px; 
    font-size: 13px;
    transition: 0.3s; 
  }
  .nav-links a:hover, .nav-links a.active { background: #00ffd5; color: black; }

  /* قسم الحساب */
  .auth-section {
    max-width: 1200px;
    margin: 10px auto;
    display: flex;
    justify-content: flex-end;
    padding: 0 20px;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 10px 15px;
    border-radius: 20px;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .auth-btn { background: none; border: none; color: white; cursor: pointer; font-size: 18px; transition: 0.2s; }
  .auth-btn.google:hover { color: #db4437; }
  .auth-btn.github:hover { color: #00ffd5; }

  .profile-ui { display: none; align-items: center; cursor: pointer; }
  .profile-ui img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00ffd5; }

  /* نافذة معلومات الحساب */
  .profile-modal {
    display: none;
    position: absolute;
    top: 130px; /* تعديل مكانها حسب التصميم */
    right: 20px;
    background: #111;
    border: 1px solid #00ffd5;
    padding: 20px;
    border-radius: 10px;
    width: 260px;
    z-index: 1001;
    box-shadow: 0 10px 40px rgba(0,0,0,0.9);
  }

  /* HERO */
  .hero { text-align: center; padding: 100px 20px; }
  .hero h1 { font-size: clamp(40px, 8vw, 70px); color: #00ffd5; text-shadow: 0 0 20px rgba(0, 255, 213, 0.4); }
  
  footer { text-align: center; padding: 30px; color: #555; font-size: 12px; }

  @media (max-width: 768px) {
    nav { flex-direction: column; gap: 15px; }
    .auth-section { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo-link">
      <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Logo">
      <h1>NEXAURON</h1>
    </a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="games.html">Games</a>
      <a href="team.html">Team</a>
      <a href="support.html">Support</a>
    </div>
  </nav>
</header>

<div class="auth-section">
  <div class="login-card" id="loginUI">
    <span style="font-size: 13px;">Sign in:</span>
    <button class="auth-btn google" onclick="login()"><i class="fab fa-google"></i></button>
    <button class="auth-btn github" onclick="login()"><i class="fab fa-github"></i></button>
  </div>

  <div class="profile-ui" id="profileUI" onclick="toggleModal()">
    <img src="https://picsum.photos/100" alt="Profile">
  </div>
</div>

<div class="profile-modal" id="profileModal">
  <h3 style="color:#00ffd5; margin-bottom: 10px;">Muntadhar Raed</h3>
  <p style="font-size: 14px; margin: 5px 0;"><strong>Gender:</strong> Male</p>
  <p style="font-size: 14px; margin: 5px 0;"><strong>Joined:</strong> May 1, 2026</p>
  <button onclick="logout()" style="width:100%; margin-top:15px; background:#ff0050; border:none; color:white; padding:8px; border-radius:5px; cursor:pointer;">Sign Out</button>
</div>

<div class="hero">
  <h1>NEXAURON</h1>
  <p>We bring our games into a perfect atmosphere suitable for everyone.</p>
</div>

<footer>
  © 2026 NEXAURON Studios - All Rights Reserved
</footer>

<script>
  const loginUI = document.getElementById('loginUI');
  const profileUI = document.getElementById('profileUI');
  const profileModal = document.getElementById('profileModal');

  // ميزة الخزن المحلي (LocalStorage): حتى يبقى مسجل دخول حتى لو دست على اللوجو أو سويت ريفريش
  if (localStorage.getItem('isLoggedIn') === 'true') {
    showProfile();
  }

  function login() {
    localStorage.setItem('isLoggedIn', 'true');
    showProfile();
  }

  function logout() {
    localStorage.setItem('isLoggedIn', 'false');
    location.reload(); // إعادة تحميل الصفحة ليرجع لشكل تسجيل الدخول
  }

  function showProfile() {
    loginUI.style.display = 'none';
    profileUI.style.display = 'flex';
  }

  function toggleModal() {
    profileModal.style.display = (profileModal.style.display === 'block') ? 'none' : 'block';
  }

  // إغلاق النافذة إذا ضغطت بمكان برة
  window.onclick = function(event) {
    if (!event.target.closest('#profileUI') && !event.target.closest('#profileModal')) {
      profileModal.style.display = 'none';
    }
  }
</script>

</body>
</html>
