<title>NEXAURON | Support</title>
<style>
  /* GLOBAL STYLES */
  body { 
    margin: 0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: radial-gradient(circle at top, #0f2027, #000000); 
    color: white; 
    min-height: 100vh;
    position: relative;
    padding-bottom: 100px; /* Space for footer */
  }

  /* NAVBAR */
  nav { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 20px 40px; 
    background: rgba(0, 0, 0, 0.9); 
    border-bottom: 1px solid #00ffd533; 
  }
  .logo-link { display: flex; align-items: center; text-decoration: none; }
  .logo-link img { height: 50px; margin-right: 15px; border-radius: 8px; }
  .logo-link h1 { color: #00ffd5; margin: 0; font-size: 26px; letter-spacing: 2px; }
  
  /* NAV LINKS */
  .nav-links { display: flex; gap: 15px; }
  .nav-links a { 
    color: white; 
    text-decoration: none; 
    font-weight: bold; 
    padding: 10px 25px; 
    border: 2px solid #00ffd5; 
    border-radius: 10px; 
    transition: all 0.3s ease; 
  }
  .nav-links a:hover, .nav-links a.active { 
    background: #00ffd5; 
    color: black; 
    box-shadow: 0 0 15px rgba(0, 255, 213, 0.5); 
    transform: translateY(-2px); 
  }
  
  /* SUPPORT SECTION */
  .section { padding: 120px 20px; text-align: center; }
  .email-box { 
    background: rgba(0, 255, 213, 0.05); 
    padding: 40px; 
    border-radius: 15px; 
    border: 1px solid #00ffd533; 
    display: inline-block; 
    margin-top: 20px; 
  }
  .btn { 
    display: inline-block; 
    margin: 10px; 
    padding: 15px 30px; 
    background: #00ffd5; 
    color: black; 
    border-radius: 8px; 
    text-decoration: none; 
    font-weight: bold; 
    font-size: 18px; 
    transition: 0.3s; 
  }
  .btn:hover { background: white; }

  /* FOOTER */
  footer { 
    text-align: center; 
    padding: 30px; 
    background: #050505; 
    color: #555; 
    position: absolute; 
    bottom: 0; 
    width: 100%; 
    border-top: 1px solid #111; 
    box-sizing: border-box;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-link">
    <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Logo">

  </a>
  <div class="nav-links">

  <p style="color:#aaa; font-size: 22px; max-width: 600px; margin: 0 auto 20px;">
    If you encounter any problem, please contact us.
  </p>
  
  <div class="email-box">
    <p style="margin-bottom: 20px; font-size: 18px; color: #ccc;">Send us an email:</p>

  </div>
